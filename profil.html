<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil Saya</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }


    :root {
      --green-dark: #2d5a27;
      --green-mid: #3a7232;
      --green-light: #4e8f43;
      --bg-page: #f0f0f0;
      --bg-card: #ffffff;
      --bg-input: #f5f5f5;
      --text-primary: #1a1a1a;
      --text-label: #444;
      --text-placeholder: #aaa;
      --border: #e0e0e0;
      --radius-card: 20px;
      --radius-input: 10px;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.08);
    }


    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg-page);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }


    .phone-wrapper {
      width: 100%;
      max-width: 400px;
    }


    /* Page title */
    .page-title {
      font-size: 14px;
      color: #888;
      font-weight: 600;
      margin-bottom: 14px;
      padding-left: 4px;
    }


    /* Card */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 24px 20px 28px;
      position: relative;
    }


    /* Section heading */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 20px;
    }


    .section-heading .chevron {
      font-size: 20px;
      color: var(--text-primary);
      font-weight: 900;
    }


    /* Cover photo */
    .profil-cover-photo {
  width: 100%;
  height: 150px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;


  background-image: url('images/wp profil.jpg');
  background-size: cover;
  background-position: center;
}


    .cover-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }


    /* Cover nature SVG fallback */
    .cover-nature {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #87ceeb 0%, #87ceeb 30%, #4a8c3f 30%, #2d5a27 100%);
      position: relative;
      overflow: hidden;
    }


    /* Avatar */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-top: -48px;
      position: relative;
      z-index: 2;
    }


    .avatar-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #d0d0d0;
      border: 4px solid #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }


    .avatar-circle svg {
      width: 70px;
      height: 70px;
      fill: #a0a0a0;
    }


    /* Ubah Foto button */
    .btn-change-photo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--green-dark);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      cursor: pointer;
      margin: 14px auto 0;
      width: fit-content;
      transition: background 0.2s;
    }


    .btn-change-photo:hover {
      background: var(--green-mid);
    }


    .btn-change-photo svg {
      width: 18px;
      height: 18px;
      fill: white;
    }


    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 22px 0 18px;
    }


    /* Form */
    .form-group {
      margin-bottom: 18px;
    }


    .form-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-label);
      margin-bottom: 7px;
      display: block;
    }


    .form-input {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid transparent;
      border-radius: var(--radius-input);
      padding: 11px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }


    .form-input:focus {
      border-color: var(--green-light);
      background: #fff;
    }


    /* Gender radio */
    .gender-group {
      display: flex;
      gap: 20px;
      margin-top: 4px;
    }


    .gender-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-label);
      user-select: none;
    }


    .gender-option input[type="radio"] {
      display: none;
    }


    .gender-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2.5px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      background: #fff;
      flex-shrink: 0;
    }


    .gender-option input[type="radio"]:checked + .gender-check {
      background: var(--green-dark);
      border-color: var(--green-dark);
    }


    .gender-option input[type="radio"]:checked + .gender-check::after {
      content: '';
      display: block;
      width: 6px;
      height: 10px;
      border: 2.5px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }


    /* Save button */
    .btn-save {
      display: block;
      width: 100%;
      background: var(--green-dark);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      border: none;
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      margin-top: 28px;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.1s;
    }


    .btn-save:hover {
      background: var(--green-mid);
    }


    .btn-save:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>


  <div class="phone-wrapper">
    <div class="page-title">Profil</div>


    <div class="card">
      <!-- Section heading -->
      <div class="section-heading">
        <span class="chevron">›</span>
        <span>Profil Saya</span>
      </div>


        <!-- Cover Photo -->
      <div class="profil-cover-photo"></div>


      <!-- Avatar -->
      <div class="avatar-wrap">
        <div class="avatar-circle" id="avatarCircle">
          <!-- Person silhouette SVG -->
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <circle cx="40" cy="28" r="16" fill="#a8a8a8"/>
            <ellipse cx="40" cy="72" rx="28" ry="20" fill="#a8a8a8"/>
          </svg>
        </div>
      </div>


      <!-- Hidden file input for gallery -->
      <input type="file" id="fotoInput" accept="image/*" style="display:none;" onchange="previewFoto(event)" />


      <!-- Change photo button -->
      <button class="btn-change-photo" onclick="document.getElementById('fotoInput').click()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4z"/>
          <path d="M9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
        </svg>
        Ubah Foto
      </button>


      <hr class="divider" />


      <!-- Form -->
      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input class="form-input" type="text" placeholder="Masukkan nama lengkap" />
      </div>


      <div class="form-group">
        <label class="form-label">Jenis Kelamin</label>
        <div class="gender-group">
          <label class="gender-option">
            <input type="radio" name="gender" value="perempuan" />
            <span class="gender-check"></span>
            Perempuan
          </label>
          <label class="gender-option">
            <input type="radio" name="gender" value="laki-laki" />
            <span class="gender-check"></span>
            Laki-Laki
          </label>
        </div>
      </div>


      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" value="nama@gmail.com" />
      </div>


      <div class="form-group">
        <label class="form-label">Nomor Telepon</label>
        <input class="form-input" type="tel" placeholder="Masukkan nomor telepon" />
      </div>


      <button class="btn-save">Simpan Perubahan</button>
    </div>
  </div>


  <script>
    function previewFoto(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const circle = document.getElementById('avatarCircle');
        circle.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
